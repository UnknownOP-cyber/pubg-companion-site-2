name: Auto Process Site

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 1: Minify HTML/CSS
      - name: Auto Minify
        uses: nizarmah/auto-minify@v2.1
        with:
          directory: '.'
          overwrite: true

      # Step 2: Setup Node for Obfuscator
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install & Run Obfuscator
      - name: Install and Run Obfuscator
        run: |
          npm install -g javascript-obfuscator
          javascript-obfuscator script.js --output script.js --compact true --self-defending true

      # Step 4: Final Auto Commit (Sab kuch ek sath save hoga)
      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Bot: Minified & Obfuscated code"
          branch: ${{ github.ref }}
